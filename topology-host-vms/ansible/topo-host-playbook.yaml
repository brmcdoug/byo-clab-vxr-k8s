---

# ansible-playbook -i hosts topo-host-playbook.yaml -e "ansible_user=cisco ansible_ssh_pass=cisco123 ansible_sudo_pass=cisco123" -vv

# Host VMs Tasks
- name: host-vms
  hosts: host-vms
  become: true
  tasks:

    - name: set timezone
      community.general.timezone:
        name: America/Los_Angeles

    - name: apt update
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: apt upgrade
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true

# Topology Host Tasks
- name: topology-host tasks
  hosts: localhost
  become: true
  tasks:

    - name: set hostname
      ansible.builtin.hostname:
        name: topology-host

    - name: update /etc/hosts with hostname
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1 topology-host"
        state: present

    - name: install containerlab
      ansible.builtin.shell: "curl -sL https://containerlab.dev/setup | bash -s 'all'"

    - name: install vrnetlab
      ansible.builtin.git:
        repo: https://github.com/srl-labs/vrnetlab.git
        dest: /opt/vrnetlab

# Jalapeno VM Tasks
- name: jalapeno tasks
  hosts: jalapeno
  become: true
  tasks:
    - name: set hostname
      ansible.builtin.hostname:
        name: jalapeno

    - name: update /etc/hosts with hostname
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1 jalapeno"
        state: present

    - name: install kind
      ansible.builtin.get_url:
        url: https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
        dest: /usr/local/bin/kind
        mode: '0755'

    - name: get latest kubectl version
      ansible.builtin.uri:
        url: https://dl.k8s.io/release/stable.txt
        return_content: true
      register: kubectl_version

    - name: install kubectl
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version.content | trim }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: write kind cluster config
      ansible.builtin.copy:
        dest: /tmp/kind-config.yaml
        content: |
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
            extraPortMappings:
            - containerPort: 30852
              hostPort: 30852
              protocol: TCP
            - containerPort: 30800
              hostPort: 30800
              protocol: TCP
            - containerPort: 30700
              hostPort: 30700
              protocol: TCP
            - containerPort: 30511
              hostPort: 30511
              protocol: TCP
            - containerPort: 30092
              hostPort: 30092
              protocol: TCP

    - name: create kind cluster with port mappings for Jalapeno NodePort services
      ansible.builtin.command: kind create cluster --name jalapeno --config=/tmp/kind-config.yaml

    - name: verify kind cluster info
      ansible.builtin.command: kubectl cluster-info --context kind-jalapeno

    - name: verify kind cluster nodes
      ansible.builtin.command: kubectl get nodes

    - name: install Helm
      ansible.builtin.shell: |
        curl -fsSL -o /tmp/get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        chmod 700 /tmp/get_helm.sh
        /tmp/get_helm.sh

    - name: Helm install Jalapeno
      ansible.builtin.command: >
        helm install jalapeno charts/jalapeno
        -f charts/jalapeno/values-kind.yaml
        --namespace jalapeno --create-namespace

