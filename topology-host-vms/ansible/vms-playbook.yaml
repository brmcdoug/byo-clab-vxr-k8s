# Topology Host non-sudo Tasks
- name: topology-host non-sudo tasks
  hosts: localhost
  tasks:

    - name: install vrnetlab
      ansible.builtin.git:
        repo: https://github.com/srl-labs/vrnetlab.git
        dest: /home/cisco/vrnetlab    

# Jalapeno sudo Tasks
- name: jalapeno tasks
  hosts: jalapeno
  become: true
  tasks:
    - name: set hostname
      ansible.builtin.hostname:
        name: jalapeno

    - name: update /etc/hosts with hostname
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1 jalapeno"
        state: present

    - name: install docker prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: add docker GPG key
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: add docker apt repository
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
        https://download.docker.com/linux/ubuntu \
        $(. /etc/os-release && echo ${UBUNTU_CODENAME:-$VERSION_CODENAME}) stable" \
        > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: install docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: add user to docker group
      ansible.builtin.user:
        name: cisco
        groups: docker
        append: true

    - name: reset ssh connection for group change
      ansible.builtin.meta: reset_connection

    - name: ensure docker is running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: install kind
      ansible.builtin.shell: |
        curl -Lo /usr/local/bin/kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
        chmod 755 /usr/local/bin/kind
      args:
        creates: /usr/local/bin/kind

    - name: install kubectl
      ansible.builtin.shell: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod 755 kubectl
        mv kubectl /usr/local/bin/kubectl
      args:
        creates: /usr/local/bin/kubectl

    - name: install Helm
      ansible.builtin.shell: |
        curl -fsSL -o /tmp/get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        chmod 700 /tmp/get_helm.sh
        /tmp/get_helm.sh

# Jalapeno non-sudo Tasks
- name: jalapeno non-sudo tasks
  hosts: jalapeno
  tasks:

    - name: write kind cluster config
      ansible.builtin.copy:
        dest: /tmp/kind-config.yaml
        content: |
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
            extraPortMappings:
            - containerPort: 30852
              hostPort: 30852
              protocol: TCP
            - containerPort: 30800
              hostPort: 30800
              protocol: TCP
            - containerPort: 30700
              hostPort: 30700
              protocol: TCP
            - containerPort: 30511
              hostPort: 30511
              protocol: TCP
            - containerPort: 30092
              hostPort: 30092
              protocol: TCP

    # - name: create kind cluster with port mappings for Jalapeno NodePort services
    #   ansible.builtin.command: kind create cluster --name jalapeno --config=/tmp/kind-config.yaml

    # - name: wait for kind node to be ready
    #   ansible.builtin.command: kubectl wait --for=condition=Ready nodes --all --timeout=120s

    # - name: verify kind cluster info
    #   ansible.builtin.command: kubectl cluster-info --context kind-jalapeno

    # - name: verify kind cluster nodes
    #   ansible.builtin.command: kubectl get nodes

    - name: Helm install Jalapeno
      ansible.builtin.command: >
        helm install jalapeno oci://ghcr.io/jalapeno/helm-charts/jalapeno
        --version 1.0.0
        --namespace jalapeno --create-namespace
        --set arangodb.persistence.data.storageClass=standard
        --set arangodb.persistence.appdata.storageClass=standard
        --set kafka.zookeeper.persistence.storageClass=standard
        --set kafka.broker.persistence.storageClass=standard

